name: build test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:unstable

    steps:
    - name: get git
      run: |
        apt-get update
        apt-get install -y git
        
    - name: Checkout Repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
        
    - name: get d++ and dependencies
      run: |
        apt-get install -y \
          g++-16 \
          gcc-16 \
          build-essential \
          pkg-config \
          cmake \
          wget \
          libsqlite3-dev \
          libmagick++-7.q16hdri-dev \
          nlohmann-json3-dev \
          libsodium-dev \
          libssl-dev \
          zlib1g-dev \
          ocl-icd-opencl-dev \
          opencl-headers \
          libopus0 \
          libopus-dev

        wget -O dpp.deb https://github.com/brainboxdotcc/DPP/releases/download/v10.1.4/libdpp-10.1.4-linux-x64.deb
        dpkg -i dpp.deb || apt-get install -f -y

    - name: Build D+++++++
      run: |
        git clone https://github.com/joshuazcchen/dpp_enhanced_roles.git
        cmake -S dpp_enhanced_roles -B dpp_enhanced_roles/build -DCMAKE_BUILD_TYPE=Release
        cmake --build dpp_enhanced_roles/build --parallel $(nproc)
        cmake --install dpp_enhanced_roles/build

    - name: Configure CMake
      env:
        CC: gcc-16
        CXX: g++-16
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: axuaxibot-folder
        path: ${{github.workspace}}/build

  test:
    name: Unit tests
    needs: build
    runs-on: ubuntu-latest
    container: debian:unstable

    steps:
    - name: Download workspace
      uses: actions/download-artifact@v8
      with:
        name: axuaxibot-folder
        path: ${{github.workspace}}/build

    - name: checkout
      uses: actions/checkout@v6

    - name: Install runtime dependencies
      run: |
        apt-get update
        apt-get install -y cmake libsqlite3-dev libmagick++-7.q16hdri-dev libsodium-dev libssl-dev libopus0
    
    - name: Run unit tests
      run: ${{github.workspace}}/build/axuaura_tests
